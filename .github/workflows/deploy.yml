name: Deploy Production + Staging

on:
  push:
    branches: [ master, staging, "feature/**" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    # Run on push, manual dispatch, and Dependabot PRs (so dep bumps get test signal).
    # Skipped on regular PRs — previews go straight to staging.
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.actor == 'dependabot[bot]')
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # Three.js + D3 are vendored under /vendor; Mermaid is lazy-loaded
      # inside modals.js on first modal open. Pa11y no longer stalls
      # waiting on CDN responses in headless Chrome.
      - name: Start static server
        run: npx serve -l 8000 . &
      - name: Wait for server
        run: |
          until curl -sf http://localhost:8000/index.html > /dev/null; do
            sleep 1
          done
      - run: npm run test:a11y

  deploy-production:
    name: Deploy → Production (cjunker.dev)
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.ref == 'refs/heads/master' && github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          cname: cjunker.dev
          force_orphan: true
          keep_files: true
          exclude_assets: '.github,node_modules,tests,package*.json,.gitignore,.stylelintrc.json,.htmlvalidate.json,decisions,TODO.md,CLAUDE.md,analytics-config.js,umami,healthcheck'
      - name: Summary
        run: |
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          ### Production Deployment
          **URL:** https://cjunker.dev
          **Commit:** ${{ github.sha }}
          **Time:** $(date -u)
          EOF

  deploy-staging:
    name: Deploy → Staging (staging.cjunker.dev)
    runs-on: ubuntu-latest
    # NO `needs: test` → PRs deploy instantly without waiting.
    # Skip Dependabot PRs — they don't have access to ACTIONS_DEPLOY_KEY
    # (Dependabot secrets are scoped separately from regular repo secrets).
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.ref != 'refs/heads/master' && github.event_name == 'push' ||
       github.event_name == 'pull_request' ||
       (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'))
    environment: staging
    concurrency:
      group: staging-deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: cjunks94/resume-improvements-staging
          publish_branch: gh-pages
          publish_dir: .
          cname: staging.cjunker.dev
          # Drop force_orphan + keep existing files so the CNAME file
          # and Pages config persist across deploys. force_orphan was
          # making GitHub treat each push as a fresh setup, dropping
          # the custom domain back to null.
          force_orphan: false
          keep_files: true
          exclude_assets: '.github,node_modules,tests,package*.json,.gitignore,.stylelintrc.json,.htmlvalidate.json,decisions,TODO.md,CLAUDE.md,analytics-config.js,umami,healthcheck'
      - name: Verify CNAME landed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 10
          echo "## Pages config after deploy" >> $GITHUB_STEP_SUMMARY
          gh api repos/cjunks94/resume-improvements-staging/pages \
            --jq '{cname, status, html_url}' \
            >> $GITHUB_STEP_SUMMARY || echo "(read access on staging repo not available — check manually)"
      - name: Summary
        run: |
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          ### Staging Deployment
          **URL:** https://staging.cjunker.dev
          **Source:** ${{ github.ref_name || github.head_ref }}
          **PR:** #${{ github.event.pull_request.number || 'N/A' }}
          **Commit:** ${{ github.sha }}
          **Time:** $(date -u)
          EOF
